<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountPro Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        select option { background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";

        // CONFIGURAÇÃO FIREBASE
        // Nota: Substitua pelos seus dados se estiver usando um Firebase próprio.
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "account-pro-v1";

        // Tornar global para o Babel acessar
        window.FirebaseDB = { db, auth, collection, addDoc, onSnapshot, signInAnonymously, onAuthStateChanged, appId };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Users, Sword, Target, Gem, Plus, Calendar, 
            Clock, Camera, X, CheckCircle, ChevronRight, 
            Calculator, Cloud, AlertCircle 
        } = lucide;

        const CLASSES = ['Arqueira', 'Lutador', 'Mago', 'Mecânico', 'Atalanta'];

        const App = () => {
            const { db, auth, collection, addDoc, onSnapshot, signInAnonymously, onAuthStateChanged, appId } = window.FirebaseDB;
            
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('vitrine');
            const [clients, setClients] = useState([]);
            const [isRegisterModalOpen, setIsRegisterModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [dbError, setDbError] = useState(null);
            
            const [newClient, setNewClient] = useState({ 
                nick: '', level: '', classe: 'Arqueira', nomeReal: '', whatsapp: '', foto: null 
            });

            useEffect(() => {
                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                    if (!currentUser) {
                        signInAnonymously(auth);
                    }
                    setUser(currentUser);
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const clientsRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
                
                const unsubscribe = onSnapshot(clientsRef, (snapshot) => {
                    const list = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setClients(list);
                    setLoading(false);
                }, (err) => {
                    setDbError("Erro de permissão ou conexão.");
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const handleRegister = async (e) => {
                e.preventDefault();
                try {
                    const clientsRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
                    await addDoc(clientsRef, {
                        ...newClient,
                        createdAt: new Date().toISOString()
                    });
                    setIsRegisterModalOpen(false);
                    setNewClient({ nick: '', level: '', classe: 'Arqueira', nomeReal: '', whatsapp: '', foto: null });
                } catch (err) { setDbError("Erro ao salvar."); }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.size < 1000000) {
                    const reader = new FileReader();
                    reader.onloadend = () => setNewClient(prev => ({ ...prev, foto: reader.result }));
                    reader.readAsDataURL(file);
                } else { alert("Imagem muito grande (Max 1MB)"); }
            };

            const Vitrine = () => (
                <div className="p-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h2 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 uppercase tracking-widest italic mb-2">Vitrine Global</h2>
                            <p className="text-slate-500 text-sm flex items-center gap-2"><Cloud size={14} className="text-cyan-500" /> Sincronização Ativa</p>
                        </div>
                        <button onClick={() => setIsRegisterModalOpen(true)} className="flex items-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-black font-black px-6 py-3 rounded-full transition-all shadow-lg uppercase italic text-sm">
                            <Plus size={20} /> Registrar Herói
                        </button>
                    </div>

                    {loading ? (
                        <div className="text-center py-20 opacity-50 uppercase tracking-widest text-xs">Carregando dados...</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {clients.map(client => (
                                <div key={client.id} className="bg-slate-900/40 border border-white/5 rounded-[2rem] overflow-hidden hover:border-cyan-500/40 transition-all">
                                    <div className="h-48 bg-slate-800 relative">
                                        {client.foto ? <img src={client.foto} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center opacity-20 text-4xl font-black italic">{client.nick[0]}</div>}
                                        <div className="absolute top-4 right-4 bg-cyan-500 text-black px-3 py-1 rounded-full text-[10px] font-black italic">LVL {client.level}</div>
                                    </div>
                                    <div className="p-6 relative">
                                        <div className="absolute -top-4 left-6 bg-purple-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase italic">{client.classe}</div>
                                        <h3 className="text-xl font-black uppercase italic mb-1">{client.nick}</h3>
                                        <p className="text-cyan-400/80 text-[10px] font-bold uppercase">{client.nomeReal}</p>
                                        <div className="mt-4 pt-4 border-t border-white/5 flex justify-between text-[10px] text-slate-500 uppercase font-black">
                                            <span>WhatsApp</span>
                                            <span className="text-cyan-200">{client.whatsapp}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen bg-[#050505] text-slate-200">
                    <div className="flex min-h-screen">
                        <aside className="hidden md:flex w-64 border-r border-white/5 bg-black/40 flex-col p-4 fixed h-full">
                            <div className="flex items-center gap-2 py-8 px-2">
                                <div className="w-8 h-8 bg-cyan-500 rounded flex items-center justify-center font-black text-black italic">A</div>
                                <span className="font-black uppercase italic tracking-tighter">Account<span className="text-cyan-500">Pro</span></span>
                            </div>
                            <nav className="flex-1 space-y-2">
                                <button onClick={() => setActiveTab('vitrine')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-black uppercase italic text-[10px] tracking-widest ${activeTab === 'vitrine' ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-500'}`}><Users size={16}/> Vitrine</button>
                                <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-black uppercase italic text-[10px] tracking-widest text-slate-800 cursor-not-allowed"><Sword size={16}/> Em breve</button>
                            </nav>
                        </aside>

                        <main className="flex-1 md:ml-64">
                            <header className="h-16 border-b border-white/5 flex items-center px-8 bg-black/20 sticky top-0 z-20">
                                <div className="text-[10px] font-black uppercase text-slate-600 tracking-widest">Dashboard / {activeTab}</div>
                            </header>
                            <Vitrine />
                        </main>
                    </div>

                    {isRegisterModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                            <div className="bg-[#0c0c0e] border border-white/10 w-full max-w-md rounded-[2.5rem] p-8">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="font-black uppercase italic text-xl">Novo <span className="text-cyan-500">Herói</span></h3>
                                    <button onClick={() => setIsRegisterModalOpen(false)}><X/></button>
                                </div>
                                <form onSubmit={handleRegister} className="space-y-4">
                                    <input required placeholder="Nick" className="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500" value={newClient.nick} onChange={e => setNewClient({...newClient, nick: e.target.value})} />
                                    <input required type="number" placeholder="Level" className="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500" value={newClient.level} onChange={e => setNewClient({...newClient, level: e.target.value})} />
                                    <select className="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none" value={newClient.classe} onChange={e => setNewClient({...newClient, classe: e.target.value})}>
                                        {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <input required placeholder="Nome Real" className="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none" value={newClient.nomeReal} onChange={e => setNewClient({...newClient, nomeReal: e.target.value})} />
                                    <input required placeholder="WhatsApp" className="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none" value={newClient.whatsapp} onChange={e => setNewClient({...newClient, whatsapp: e.target.value})} />
                                    <input type="file" accept="image/*" onChange={handleFileUpload} className="text-xs text-slate-500" />
                                    <button className="w-full bg-cyan-600 p-4 rounded-xl font-black uppercase italic mt-4 hover:bg-cyan-500 text-black">Salvar na Nuvem</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
