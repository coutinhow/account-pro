<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DashPRO | Gestão Financeira</title>
    
    <!-- Dependências -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020202;
            color: white;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ajuste de Scroll para Mobile */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .custom-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.3;
        }

        .glass-effect {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Transição Suave entre Tabs */
        #main-view-container {
            transition: opacity 0.2s ease-in-out;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .day-active { background: rgba(0, 255, 65, 0.05); }
        .day-today { border-color: #00FF41; background: rgba(0, 255, 65, 0.15); }
        .has-event::after {
            content: '';
            width: 4px; height: 4px;
            background: #00FF41;
            border-radius: 50%;
            margin-top: 2px;
        }

        /* Estilo para Tab Bar Mobile */
        .tab-bar-item.active { color: #00FF41; }
        .tab-bar-item.active i { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-[#020202] text-white">

    <!-- Background Animado -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-30">
        <div class="absolute top-[-5%] left-[-10%] w-[60%] h-[40%] bg-[#00FF41]/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-5%] right-[-10%] w-[60%] h-[40%] bg-blue-500/10 rounded-full blur-[100px]"></div>
    </div>

    <!-- HEADER MOBILE -->
    <header class="sticky top-0 z-40 glass-effect border-b border-white/5 p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#00FF41] rounded-lg flex items-center justify-center">
                <i data-lucide="trending-up" class="text-black w-5 h-5"></i>
            </div>
            <h1 class="font-black text-lg tracking-tighter uppercase">Dash<span class="text-[#00FF41]">PRO</span></h1>
        </div>
        <button onclick="openProfile()" class="w-9 h-9 rounded-full border border-white/10 bg-neutral-800 overflow-hidden">
            <img id="profile-avatar" src="" class="hidden w-full h-full object-cover">
            <i id="profile-icon" data-lucide="user" class="w-full h-full p-2 opacity-50"></i>
        </button>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="relative z-10 pb-24 p-4 min-h-screen">
        
        <!-- Seleção de Mês/Ano (Compacto) -->
        <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/10 mb-6">
            <button onclick="changeMonth(-1)" class="p-2 active:bg-white/10 rounded-xl transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
            <div class="text-center">
                <p id="display-month" class="text-xs font-black uppercase tracking-widest text-[#00FF41]">Janeiro</p>
                <p id="display-year" class="text-[10px] font-bold text-white/20 uppercase">2024</p>
            </div>
            <button onclick="changeMonth(1)" class="p-2 active:bg-white/10 rounded-xl transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>

        <h2 id="view-title" class="text-3xl font-extrabold tracking-tighter mb-6 capitalize">Dashboard</h2>

        <div id="main-view-container" class="space-y-6">
            <!-- Renderizado via JS -->
        </div>
    </main>

    <!-- NAVEGAÇÃO INFERIOR (TAB BAR) -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 glass-effect border-t border-white/10 px-4 py-2 flex justify-between items-center">
        <button onclick="navigate('dashboard')" data-tab="dashboard" class="tab-bar-item active flex flex-col items-center gap-1 p-2 text-white/40 transition-all">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase">Início</span>
        </button>
        <button onclick="navigate('ledger')" data-tab="ledger" class="tab-bar-item flex flex-col items-center gap-1 p-2 text-white/40 transition-all">
            <i data-lucide="receipt-text" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase">Vendas</span>
        </button>
        
        <!-- Botão Central de Adição -->
        <button onclick="openModal()" class="bg-[#00FF41] text-black w-12 h-12 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(0,255,65,0.3)] -mt-10 border-4 border-[#020202] active:scale-90 transition-transform">
            <i data-lucide="plus" class="w-6 h-6 stroke-[3]"></i>
        </button>

        <button onclick="navigate('personal')" data-tab="personal" class="tab-bar-item flex flex-col items-center gap-1 p-2 text-white/40 transition-all">
            <i data-lucide="wallet" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase">Gastos</span>
        </button>
        <button onclick="navigate('calendar')" data-tab="calendar" class="tab-bar-item flex flex-col items-center gap-1 p-2 text-white/40 transition-all">
            <i data-lucide="calendar-days" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase">Fixos</span>
        </button>
    </nav>

    <!-- MODAL LANÇAMENTO (FULLSCREEN MOBILE) -->
    <div id="modal-input" class="hidden fixed inset-0 bg-[#020202] z-[100] flex flex-col p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 id="modal-title" class="text-2xl font-black italic">DASH <span class="text-[#00FF41]">INPUT</span></h2>
            <button onclick="closeModal()" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
        </div>

        <div class="grid grid-cols-4 p-1 bg-white/5 rounded-2xl mb-8" id="type-selector">
            <button onclick="setFormType('venda')" data-type="venda" class="type-btn py-3 rounded-xl text-[8px] font-black uppercase bg-[#00FF41] text-black">venda</button>
            <button onclick="setFormType('pessoal')" data-type="pessoal" class="type-btn py-3 rounded-xl text-[8px] font-black uppercase text-white/30">pessoal</button>
            <button onclick="setFormType('calendar')" data-type="calendar" class="type-btn py-3 rounded-xl text-[8px] font-black uppercase text-white/30">fixos</button>
            <button onclick="setFormType('invest')" data-type="invest" class="type-btn py-3 rounded-xl text-[8px] font-black uppercase text-white/30">invest</button>
        </div>

        <form id="record-form" class="space-y-5">
            <input type="hidden" id="fId">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-white/30 uppercase ml-2">Descrição</label>
                <input id="fDesc" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#00FF41]" placeholder="Ex: Venda de Produto">
            </div>
            
            <div id="venda-fields" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-white/30 uppercase ml-2">Bruto</label>
                        <input id="fGross" type="number" step="0.01" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl" placeholder="R$ 0,00">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-white/30 uppercase ml-2">Custo</label>
                        <input id="fCusto" type="number" step="0.01" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl" placeholder="R$ 0,00">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-white/30 uppercase ml-2">Método de Pagamento</label>
                    <select id="fMethod" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#00FF41] outline-none"></select>
                </div>
            </div>

            <div id="simple-fields" class="hidden space-y-1">
                <label class="text-[10px] font-bold text-white/30 uppercase ml-2">Valor</label>
                <input id="fValue" type="number" step="0.01" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" placeholder="R$ 0,00">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-white/30 uppercase ml-2">Data</label>
                <input id="fDate" type="date" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            </div>

            <button type="submit" id="btn-submit" class="w-full py-5 bg-[#00FF41] text-black font-black rounded-2xl uppercase tracking-widest shadow-xl active:scale-95 transition-all mt-4">SALVAR REGISTRO</button>
        </form>
    </div>

    <!-- MODAL PERFIL (FULLSCREEN) -->
    <div id="modal-profile" class="hidden fixed inset-0 bg-[#020202] z-[110] flex flex-col p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic">PERFIL <span class="text-[#00FF41]">PRO</span></h2>
            <button onclick="closeProfile()" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
        </div>
        
        <div class="relative mx-auto w-32 h-32 mb-10">
            <div class="w-full h-full rounded-full border-2 border-[#00FF41] bg-black overflow-hidden flex items-center justify-center">
                <img id="profile-preview" src="" class="hidden w-full h-full object-cover">
                <i id="preview-icon" data-lucide="user" class="opacity-20 text-[#00FF41] w-12 h-12"></i>
            </div>
            <label for="photo-upload" class="absolute bottom-0 right-0 bg-[#00FF41] text-black p-2 rounded-full shadow-lg cursor-pointer">
                <i data-lucide="camera" class="w-5 h-5"></i>
            </label>
            <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="handlePhoto(event)">
        </div>

        <div class="space-y-6 mb-8">
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-white/20 ml-2">Nome do Operador</label>
                <input id="profile-name-input" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-xl font-black uppercase outline-none focus:border-[#00FF41]">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-white/20 ml-2">Meta Mensal (R$)</label>
                <input id="profile-goal-input" type="number" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 text-2xl font-black text-[#00FF41] outline-none">
            </div>
        </div>

        <button onclick="saveProfile()" class="w-full py-5 bg-[#00FF41] text-black font-black rounded-2xl uppercase tracking-widest active:scale-95 transition-all">ATUALIZAR DADOS</button>
    </div>

    <script>
        // Lógica de Negócio e Taxas (Igual ao original)
        const RATES = { 
            'PIX': 0, 'DEBITO': 1.69, '1X': 3.5, '2X': 4.85, '3X': 5.55, '4X': 6.25, '5X': 6.95, '6X': 7.65, 
            '7X': 8.49, '8X': 9.12, '9X': 9.75, '10X': 9.95, '11X': 11, '12X': 10.9
        };

        const MONTHS = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        let transactions = JSON.parse(localStorage.getItem('dashpro_data')) || [];
        let profile = JSON.parse(localStorage.getItem('dashpro_profile')) || { name: 'PRO USER', photo: '', goal: 5000 };
        
        let activeTab = 'dashboard';
        let currentFormType = 'venda';
        let myChart = null;
        let currentDate = new Date();

        const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        window.onload = init;

        function init() {
            lucide.createIcons();
            populateMethodSelect();
            updateProfileUI();
            updateTimeUI();
            renderCurrentView();
            document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
        }

        function updateTimeUI() {
            document.getElementById('display-month').innerText = MONTHS[currentDate.getMonth()];
            document.getElementById('display-year').innerText = currentDate.getFullYear();
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            updateTimeUI();
            renderCurrentView();
        }

        function populateMethodSelect() {
            const select = document.getElementById('fMethod');
            select.innerHTML = '';
            Object.keys(RATES).forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.innerText = `${r} (${RATES[r]}%)`;
                opt.className = "bg-[#0F0F0F]";
                select.appendChild(opt);
            });
        }

        function navigate(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-bar-item').forEach(btn => {
                const isSelected = btn.getAttribute('data-tab') === tab;
                btn.classList.toggle('active', isSelected);
                btn.classList.toggle('text-white/40', !isSelected);
            });
            
            const titles = { 'dashboard': 'Dashboard', 'ledger': 'Vendas', 'personal': 'Gastos', 'calendar': 'Fixos' };
            document.getElementById('view-title').innerText = titles[tab] || 'Dashboard';
            renderCurrentView();
        }

        function openModal(editId = null) {
            document.getElementById('modal-input').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Impede scroll do body
            
            if (editId) {
                const item = transactions.find(t => t.id === editId);
                if (item) {
                    document.getElementById('fId').value = item.id;
                    document.getElementById('fDesc').value = item.desc;
                    document.getElementById('fDate').value = item.date;
                    setFormType(item.type);
                    if (item.type === 'venda') {
                        document.getElementById('fGross').value = item.gross;
                        document.getElementById('fCusto').value = item.custo || 0;
                        document.getElementById('fMethod').value = item.method;
                    } else {
                        document.getElementById('fValue').value = item.amount;
                    }
                }
            }
        }

        function closeModal() { 
            document.getElementById('modal-input').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        // Funções de Perfil (Simplificadas para Mobile)
        function openProfile() { 
            document.getElementById('profile-name-input').value = profile.name;
            document.getElementById('profile-goal-input').value = profile.goal;
            updatePreview();
            document.getElementById('modal-profile').classList.remove('hidden'); 
        }
        function closeProfile() { document.getElementById('modal-profile').classList.add('hidden'); }

        function handlePhoto(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { profile.photo = ev.target.result; updatePreview(); };
                reader.readAsDataURL(file);
            }
        }

        function updatePreview() {
            const preview = document.getElementById('profile-preview');
            const icon = document.getElementById('preview-icon');
            if(profile.photo) {
                preview.src = profile.photo;
                preview.classList.remove('hidden');
                icon.classList.add('hidden');
            } else {
                preview.classList.add('hidden');
                icon.classList.remove('hidden');
            }
        }

        function saveProfile() {
            profile.name = document.getElementById('profile-name-input').value || 'PRO USER';
            profile.goal = parseFloat(document.getElementById('profile-goal-input').value) || 0;
            localStorage.setItem('dashpro_profile', JSON.stringify(profile));
            updateProfileUI();
            closeProfile();
        }

        function updateProfileUI() {
            const avatar = document.getElementById('profile-avatar');
            const icon = document.getElementById('profile-icon');
            if(profile.photo) {
                avatar.src = profile.photo;
                avatar.classList.remove('hidden');
                icon.classList.add('hidden');
            } else {
                avatar.classList.add('hidden');
                icon.classList.remove('hidden');
            }
        }

        function setFormType(type) {
            currentFormType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                const isSelected = btn.getAttribute('data-type') === type;
                btn.className = `type-btn py-3 rounded-xl text-[8px] font-black uppercase ${isSelected ? 'bg-[#00FF41] text-black' : 'text-white/30'}`;
            });
            document.getElementById('venda-fields').classList.toggle('hidden', type !== 'venda');
            document.getElementById('simple-fields').classList.toggle('hidden', type === 'venda');
        }

        document.getElementById('record-form').onsubmit = function(e) {
            e.preventDefault();
            const editId = document.getElementById('fId').value;
            const newRecord = {
                id: editId ? parseInt(editId) : Date.now(),
                type: currentFormType,
                desc: document.getElementById('fDesc').value,
                date: document.getElementById('fDate').value
            };

            if (currentFormType === 'venda') {
                const g = parseFloat(document.getElementById('fGross').value) || 0;
                const c = parseFloat(document.getElementById('fCusto').value) || 0;
                const method = document.getElementById('fMethod').value;
                newRecord.profit = (g * (1 - RATES[method] / 100)) - c;
                newRecord.method = method;
                newRecord.gross = g;
                newRecord.custo = c;
            } else {
                newRecord.amount = parseFloat(document.getElementById('fValue').value) || 0;
                if (currentFormType === 'calendar') newRecord.paid = false;
            }

            if (editId) transactions = transactions.map(t => t.id === newRecord.id ? newRecord : t);
            else transactions.unshift(newRecord);
            
            localStorage.setItem('dashpro_data', JSON.stringify(transactions));
            this.reset();
            closeModal();
            renderCurrentView();
        };

        function renderCurrentView() {
            const container = document.getElementById('main-view-container');
            const targetMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
            const filtered = transactions.filter(t => t.date.substring(0, 7) === targetMonthStr);

            if (activeTab === 'dashboard') {
                renderDashboard(filtered);
            } else if (activeTab === 'calendar') {
                renderCalendar(filtered.filter(t => t.type === 'calendar'));
            } else {
                let filterType = activeTab === 'ledger' ? 'venda' : 'pessoal';
                renderList(filtered.filter(t => t.type === filterType));
            }
            lucide.createIcons();
        }

        function renderDashboard(data) {
            let lucro = 0, gastos = 0, fixos = 0;
            data.forEach(t => {
                if (t.type === 'venda') lucro += t.profit;
                else if (t.type === 'pessoal') gastos += t.amount;
                else if (t.type === 'calendar' && !t.paid) fixos += t.amount;
            });
            const meta = Math.min((lucro / profile.goal) * 100, 100) || 0;

            document.getElementById('main-view-container').innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                        <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Lucro</p>
                        <p class="text-lg font-black text-[#00FF41]">${fmt(lucro)}</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                        <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Pendência</p>
                        <p class="text-lg font-black text-yellow-500">${fmt(fixos)}</p>
                    </div>
                </div>
                
                <div class="bg-white/5 p-5 rounded-[2rem] border border-white/5">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Meta Mensal</p>
                            <p class="text-2xl font-black">${meta.toFixed(1)}%</p>
                        </div>
                        <p class="text-[10px] font-bold text-white/20">ALVO: ${fmt(profile.goal)}</p>
                    </div>
                    <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-[#00FF41]" style="width: ${meta}%"></div>
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-[2rem] border border-white/5 h-64">
                    <canvas id="mainChart"></canvas>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black text-white/20 uppercase tracking-[0.2em] ml-2">Atividade Recente</p>
                    ${data.slice(0, 5).map(t => `
                        <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                            <div>
                                <p class="text-xs font-bold uppercase">${t.desc}</p>
                                <p class="text-[9px] opacity-30">${t.date.split('-').reverse().join('/')}</p>
                            </div>
                            <p class="text-xs font-black ${t.type === 'venda' ? 'text-[#00FF41]' : 'text-red-400'}">
                                ${fmt(t.profit || t.amount)}
                            </p>
                        </div>
                    `).join('') || '<p class="text-center py-10 opacity-20 text-xs italic">Nenhum dado este mês</p>'}
                </div>
            `;
            initChart(data);
        }

        function initChart(data) {
            const ctx = document.getElementById('mainChart');
            if(!ctx) return;
            const days = {};
            data.forEach(t => { if(t.type === 'venda') { const d = t.date.split('-')[2]; days[d] = (days[d] || 0) + t.profit; } });
            const labels = Object.keys(days).sort();
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: labels.map(l => days[l]),
                        borderColor: '#00FF41',
                        backgroundColor: 'rgba(0, 255, 65, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 2, pointRadius: 2
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { ticks: { display: false }, grid: { display: false } }, 
                        x: { ticks: { color: 'rgba(255,255,255,0.2)', font: { size: 8 } }, grid: { display: false } } 
                    }
                }
            });
        }

        function renderList(items) {
            document.getElementById('main-view-container').innerHTML = `
                <div class="space-y-3">
                    ${items.map(t => `
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center active:bg-white/10 transition-colors" onclick="openModal(${t.id})">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 rounded-full ${t.type === 'venda' ? 'bg-[#00FF41]' : 'bg-red-500'}"></div>
                                <div>
                                    <p class="text-xs font-bold uppercase">${t.desc}</p>
                                    <p class="text-[9px] opacity-30">${t.date.split('-').reverse().join('/')} • ${t.method || 'Gasto'}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black">${fmt(t.profit || t.amount)}</p>
                                <button onclick="event.stopPropagation(); deleteRecord(${t.id})" class="text-[9px] text-red-500/50 uppercase font-bold">Excluir</button>
                            </div>
                        </div>
                    `).join('') || '<p class="text-center py-20 opacity-20 text-xs italic">Lista vazia</p>'}
                </div>
            `;
        }

        function renderCalendar(items) {
            // Versão simplificada do calendário para Mobile
            document.getElementById('main-view-container').innerHTML = `
                <div class="bg-white/5 p-4 rounded-[2rem] border border-white/5 mb-6">
                    <p class="text-[10px] font-black text-white/20 uppercase mb-4 text-center">Visão Mensal</p>
                    <div class="calendar-grid" id="calendar-grid-body"></div>
                </div>
                <div class="space-y-3">
                    ${items.map(t => `
                        <div class="bg-white/5 p-4 rounded-2xl border ${t.paid ? 'border-white/5 opacity-50' : 'border-yellow-500/30'} flex justify-between items-center">
                            <button onclick="markAsPaid(${t.id})" class="flex items-center gap-3 text-left">
                                <div class="w-6 h-6 rounded-lg border border-white/10 flex items-center justify-center ${t.paid ? 'bg-green-500 border-none' : ''}">
                                    ${t.paid ? '<i data-lucide="check" class="text-black w-4 h-4"></i>' : ''}
                                </div>
                                <div>
                                    <p class="text-xs font-bold uppercase">${t.desc}</p>
                                    <p class="text-[9px] opacity-30">Vence dia ${t.date.split('-')[2]}</p>
                                </div>
                            </button>
                            <p class="text-xs font-black">${fmt(t.amount)}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            // Desenhar mini-calendário
            const grid = document.getElementById('calendar-grid-body');
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            for(let d=1; d<=daysInMonth; d++) {
                const dStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const has = items.some(i => i.date === dStr);
                const isToday = new Date().toISOString().split('T')[0] === dStr;
                grid.innerHTML += `<div class="calendar-day ${has ? 'has-event' : ''} ${isToday ? 'day-today' : ''} day-active">${d}</div>`;
            }
        }

        function markAsPaid(id) {
            transactions = transactions.map(t => t.id === id ? {...t, paid: !t.paid} : t);
            localStorage.setItem('dashpro_data', JSON.stringify(transactions));
            renderCurrentView();
        }

        function deleteRecord(id) {
            if(confirm('Excluir registro?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('dashpro_data', JSON.stringify(transactions));
                renderCurrentView();
            }
        }

    </script>
</body>
</html>
